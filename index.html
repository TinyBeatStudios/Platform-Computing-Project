<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#FFF1D3]">
    <!-- Nav Bar -->    
    <nav class="p-2 m-1 flex justify-between bg-[#5D1C6A] text-[#FFF1D3]">
        <!-- Logo -->
        <div><a>App Name / Logo here</a></div>
        
        <!--Nav Links-->
        <div class="w-1/3 flex justify-between">
            <div class="hover:text-[#FFB090]"><a href="index.html">Home</a></div>
            <div class="hover:text-[#FFB090]"><a href="index.html">My Collection</a></div>
            <div class="hover:text-[#FFB090]"><a href="about.html">About Us</a></div>
        </div>

        <!--Login/Signup Button-->
        <div>
            <button class="px-1 bg-[#CA5995] text-[#FFF1D3] rounded-full hover:bg-[#FFF1D3] hover:text-[#5D1C6A]">Login</button>
            <button class="px-1 bg-[#CA5995] text-[#FFF1D3] rounded-full hover:bg-[#FFF1D3] hover:text-[#5D1C6A]">Sign Up</button>
        </div>
    </nav>
    
    <!--Main page-->
    <main class="flex-1 m-1">
        <div class="flex justify-between bg-[#FFB090] p-1 mb-3 mt-2">
            <div>
                <span class="inline-block align-middle">Sort By: </span>
                <button class="inline-block align-middle">Title</button>
                <button class="inline-block align-middle">Status</button>
                <button class="inline-block align-middle">Genre</button>
            </div>
            <button class="rounded-lg bg-[#CA5995] text-white hover:bg-[#5D1C6A] p-1">Add Book</button>
        </div>
        <!--Book Grid-->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"> 
            <!--Book Cards-->
            <article class="bg-white shadow-md hover:-translate-y-1 hover:shadow-lg transition-transform">
                <div class="m-2 h-48 bg-[#FFB090] rounded-t-lg overflow-hidden"></div>
                <div class="p-2 bg-white">
                    <h2 class="text-[#5D1C6A] font-bold">Book title</h2>
                    <p class="text-[#2D1040]">Author's Name: John Doe</p>
                    <p class="text-[#9E8FA0] text-sm mb-4">Genre: Science Fiction</p>
                    <button class="text-[#CA5995]">View</button>
                    <button>Edit</button>
                    <button class="text-[#C94040]">Delete</button>
                    <span class="rounded-full px-2 py-0.5 mt-6 text-sm font-medium bg-[#FFF1D3] text-[#9E8FA0] border border-[#9E8FA0]">Unread</span>
                </div>
            </article>
        </div>
    </main>
</body>
</html>
